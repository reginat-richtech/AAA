name: Deploy web → Azure Container Apps

# Builds the Next.js app in web/ into a container image, pushes it to the shared
# ACR (aiempregistry), and rolls it out to the aaa-web Container App. Auth = OIDC.
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────────
# Run  ./deploy/azure-containerapp.sh  once (after `az login`). It creates the
# Container Apps environment + the aaa-web app, wires managed-identity pull from
# aiempregistry, and grants THIS repo's OIDC identity AcrPush + Contributor.
# The 3 secrets (AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID) are
# the same ones created earlier — reused as-is.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC login to Azure
  contents: read

env:
  ACR: aiempregistry          # shared registry (reused)
  IMAGE: aaa-web
  RG: aaa-rg
  APP: aaa-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push image to ACR
        run: |
          set -euo pipefail
          IMG="${ACR}.azurecr.io/${IMAGE}"
          az acr login --name "$ACR"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" ./web
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Roll out to Container App
        run: |
          set -euo pipefail
          az extension add --name containerapp --only-show-errors
          az containerapp update -g "$RG" -n "$APP" \
            --image "${ACR}.azurecr.io/${IMAGE}:${{ github.sha }}"

      - name: Open Postgres firewall for this app, then sync datasets
        env:
          DB_RG: aaa-rg                                  # resource group of the Postgres flexible server (edit if different)
          APP_URL: ${{ secrets.APP_URL }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
        run: |
          set -uo pipefail   # best-effort: never fail the deploy on these
          # 1) let the Container App's egress reach Azure Postgres ----------------
          PG=$(az postgres flexible-server list -g "$DB_RG" --query "[0].name" -o tsv 2>/dev/null || true)
          if [ -n "${PG:-}" ]; then
            echo "Postgres server: $PG (rg=$DB_RG)"
            # Container Apps (Consumption) egress from a large rotating IP pool, so
            # per-IP rules are infeasible — allow Azure-internal traffic instead.
            az postgres flexible-server firewall-rule create -g "$DB_RG" --name "$PG" \
              --rule-name AllowAzureServices --start-ip-address 0.0.0.0 --end-ip-address 0.0.0.0 \
              --only-show-errors >/dev/null 2>&1 && echo "  ✓ AllowAzureServices ensured" \
              || echo "  ! could not set AllowAzureServices (permissions?) — set it once manually"
          else
            echo "  ! no Postgres flexible server found in resource group '$DB_RG' — open the firewall manually (see chat)"
          fi
          # 2) sync every deploy (needs APP_URL + SYNC_CRON_SECRET repo secrets) ---
          if [ -n "${APP_URL:-}" ] && [ -n "${SYNC_CRON_SECRET:-}" ]; then
            echo "waiting ~45s for the new revision to become healthy…"; sleep 45
            curl -fsS -X POST "${APP_URL%/}/api/admin/sync?source=all" \
              -H "Authorization: Bearer ${SYNC_CRON_SECRET}" --max-time 290 | head -c 800 \
              && echo "" && echo "  ✓ post-deploy sync triggered" \
              || echo "  ! post-deploy sync failed (the daily job will retry)"
          else
            echo "  • APP_URL / SYNC_CRON_SECRET repo secrets not set — skipping post-deploy sync"
          fi
