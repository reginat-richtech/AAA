name: Deploy web → Azure App Service

# Builds the Next.js app in web/ and deploys it to Azure App Service (Linux, Node),
# authenticating with OIDC / federated credentials — no stored passwords to rotate.
# Runs on every push to main that touches web/, and can be run manually.
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────────
# A. Create the App Service:  Linux plan, runtime stack = Node 20 LTS.
#    Put its name in AZURE_WEBAPP_NAME below.
#
# B. Create an Entra app registration (the identity GitHub logs in as):
#      Azure Portal → Microsoft Entra ID → App registrations → New registration.
#    Note its Application (client) ID + Directory (tenant) ID + your Subscription ID.
#
# C. Let it deploy: App Service (or its resource group) → Access control (IAM) →
#      Add role assignment → "Website Contributor" → assign to that app registration.
#
# D. Add a federated credential (so GitHub logs in WITHOUT a secret):
#      App registration → Certificates & secrets → Federated credentials → Add →
#      scenario "GitHub Actions deploying Azure resources":
#         Organization: reginat-richtech
#         Repository:   AAA
#         Entity:       Branch          Branch name: main
#      → this produces subject:  repo:reginat-richtech/AAA:ref:refs/heads/main
#    (To also allow manual runs from other branches, add a second credential, or
#     use the "Environment" entity instead.)
#
# E. Add three GitHub repo secrets (Settings → Secrets and variables → Actions):
#      AZURE_CLIENT_ID        = the app registration's Application (client) ID
#      AZURE_TENANT_ID        = Directory (tenant) ID
#      AZURE_SUBSCRIPTION_ID  = your subscription ID
#
# F. App Service → Configuration → Application settings — add the runtime env
#    (the app crashes on boot without the AUTH_* / GOOGLE_* sign-in vars):
#      DATABASE_URL, OPENAI_API_KEY, OPENAI_MODEL,
#      AUTH_SECRET, AUTH_URL=https://<your-domain>,
#      GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, ALLOWED_OAUTH_DOMAINS, ADMIN_EMAILS,
#      (optional) JOTFORM_API_KEY, GOOGLE_SERVICE_ACCOUNT_JSON (inline), GOOGLE_IMPERSONATE_SUBJECT,
#      and  SCM_DO_BUILD_DURING_DEPLOYMENT = false   (we build here, not on Azure).
#
# G. App Service → Configuration → General settings → Startup Command:  npm start
#    (usually auto-detected; set explicitly if the app doesn't start).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC login to Azure
  contents: read    # required for actions/checkout

env:
  AZURE_WEBAPP_NAME: aaa-web   # <-- CHANGE to your App Service name
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: web
